<!DOCTYPE html>
<html lang="en" data-dark="0">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rewair</title>
<!-- ============================================================
  REWAIR WEB UI — Preact port
  ============================================================
  Same product as the vanilla build, restructured into Preact +
  htm components so each concept is defined ONCE. The network
  "row", signal bars, and status string are shared by both the
  Network section and the saved-networks manager (no drift).

  Runtime: Preact + htm, bundled by Vite with no CDN dependency.
  The same static output is packed into the EMW3165 RWFS image or
  can be published on an HTTPS static host for Web Bluetooth.

  Files
  - rewair.css         tokens + components (shared with vanilla)
  - rw-api.js          transport-neutral window.RewairAPI facade
  - rw-ble-*.js        Web Bluetooth transport + binary framing
  - rw-lib.js          helpers + Signal/NetworkRow/Matrix primitives
  - rw-widgets.js      ScoreHero, Sensors, DisplaySelector
  - rw-network.js      NetworkSection, Manager, Details/Connect modals
  - rw-settings.js     name/units/time/timezone
  - rw-app.js          App root: polling, theme, modal routing

  Shared API (HTTP plus the read-only BLE subset)
  - GET  /api/status   -> { name, fw, score{value,color,indices},
                            sens{temp,humid,co2,voc,dust,light},
                            wifi(sta|ap){…,saved_count}, time{valid,epoch,synced},
                            settings{name,units,tz_offset,tz_dst,tz_zone,time_mode,disp_mode} }
  - GET  /api/scan     -> [ {ssid,rssi,sec} ]
  - GET  /api/networks -> [ {ssid,sec,saved,in_range,rssi,connected} ]  (priority order)
  - POST /api/join {ssid,pass} · /api/forget {ssid} · /api/priority {order:[ssid…]}
  - POST /api/settings {patch} · /api/time {epoch} · /api/disp {mode}
  - POST /api/update (firmware .bin, streamed) · /api/reset (factory)
  - GET  /api/events   -> Server-Sent Events stream of status frames
  ============================================================ -->
<link rel="stylesheet" href="rewair.css">
</head>
<body>

<div id="app"></div>

<!-- ES module graph, bundled by Vite. rw-app.js imports rw-lib (shared RW
     namespace + preact/htm from npm), rw-widgets/rw-network/rw-settings
     (which pulls in rw-system), and rw-api (window.RewairAPI adapter). -->
<script type="module" src="/rw-app.js"></script>

</body>
</html>
